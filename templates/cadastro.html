<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>Cadastro de Usuários</h1>

        {% if error %}
            <p class="form-error">{{ error }}</p>
        {% endif %}

        <form id="cadastroForm" method="post">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" placeholder="Digite o nome" value="{{ nome|default('') }}" required>

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="Digite o e-mail" value="{{ email|default('') }}" required>

            <label for="cargo">Cargo</label>
            <input type="text" id="cargo" name="cargo" placeholder="Digite o cargo" value="{{ cargo|default('') }}" required>

            <label for="crm_coren">CRM/COREM</label>
            <input type="text" id="crm_coren" name="crm_coren" placeholder="Digite o CRM ou COREM" value="{{ crm_coren|default('') }}">

            <label>Administrador?</label>
            <div class="opcao-admin">
                <label>
                    <input type="radio" name="admin" value="sim" {% if admin == 'sim' %}checked{% endif %}>
                    Sim
                </label>

                <label>
                    <input type="radio" name="admin" value="nao" {% if admin != 'sim' %}checked{% endif %}>
                    Não
                </label>
            </div>

            <label for="senha">Senha</label>
            <div class="password-wrapper">
                <input type="password" id="senha" name="senha" placeholder="Digite a senha" required>
                <button type="button" id="togglePassword" class="toggle-password">
                    <i class="fas fa-eye"></i>
                </button>
            </div>

            <button type="submit">Cadastrar</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/cadastro.js') }}"></script>
</body>
</html>

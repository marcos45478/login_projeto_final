<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Teste</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 40px;
            color: #333;
        }
        .card {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { color: #1e4d8c; }
        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: white;
            background: #1e4d8c;
            padding: 10px 16px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Bem-vindo, {{ usuario.nome }}!</h1>
        <p>Esta é a página de teste para usuários comuns.</p>
        <a href="{{ url_for('logout') }}">Sair</a>
    </div>
</body>
</html>
